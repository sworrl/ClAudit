name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Byte-compile (catches syntax errors)
        run: python -m py_compile claudit.py claudit_scan.py claudit_gui.py scripts/gen-icon.py
      - name: Install dev deps
        run: pip install ruff pytest
      - name: Ruff (lint for real errors only)
        run: ruff check --select E9,F63,F7,F82 .
      - name: Tests
        run: python -m pytest tests/ -q
